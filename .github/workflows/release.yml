name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\iscc.exe"
          if (-not (Test-Path $iscc)) { throw "iscc.exe not found after Inno Setup install." }
          & "${{ github.workspace }}\Installer\Build-Installer.ps1"

      - name: Read version from csproj
        id: ver
        shell: pwsh
        run: |
          $match = Select-String -Path MusicWidget\MusicWidget.csproj -Pattern '<Version>([^<]+)</Version>'
          $version = $match.Matches[0].Groups[1].Value
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('v{0}', steps.ver.outputs.version) }}
          name: Beats ${{ steps.ver.outputs.version }}
          files: Installer/Output/Beats-Setup-x64.exe
          generate_release_notes: true
